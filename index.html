<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zorivo — One Platform. Something Different.</title>
  <meta name="description" content="Zorivo is the all-in-one business platform for clinics, restaurants, salons and more. CRM, scheduling, analytics — everything your team needs in one place.">
  <meta name="keywords" content="business platform, CRM, scheduling, clinic software, restaurant management, Zorivo, Central Asia, SaaS">
  <meta name="theme-color" content="#0A0A0B">
  <meta name="color-scheme" content="dark">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Zorivo — One Platform. Every Business.">
  <meta property="og:description" content="The all-in-one business OS for clinics, restaurants, salons and ambitious teams. Built for Central Asia, ready for the world.">
  <meta property="og:url" content="https://zorivo.uz">
  <meta property="og:site_name" content="Zorivo">
  <meta property="og:locale" content="en_US">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Zorivo — One Platform. Every Business.">
  <meta name="twitter:description" content="The all-in-one business OS for clinics, restaurants, salons and ambitious teams.">

  <!-- Canonical -->
  <link rel="canonical" href="https://zorivo.uz">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 56 56' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23F5B461'/%3E%3Cstop offset='100%25' stop-color='%23E8943A'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='10' y='11' width='36' height='7' rx='3.5' fill='url(%23g)'/%3E%3Cpath d='M44 14 L14 42' stroke='url(%23g)' stroke-width='7' stroke-linecap='round'/%3E%3Crect x='10' y='38' width='36' height='7' rx='3.5' fill='url(%23g)'/%3E%3Ccircle cx='46' cy='42' r='4' fill='%23FFCB75' opacity='0.9'/%3E%3C/svg%3E">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Zorivo",
    "applicationCategory": "BusinessApplication",
    "description": "All-in-one business platform for clinics, restaurants, salons and more.",
    "url": "https://zorivo.uz",
    "operatingSystem": "Web"
  }
  </script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="page-shell">
    <!-- ─── HEADER ─── -->
    <header class="brandbar">
      <a class="brand" href="/" aria-label="Zorivo — Home">
        <svg class="brand-mark" viewBox="0 0 56 56" fill="none" aria-hidden="true">
          <defs>
            <linearGradient id="brandMarkGradient" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#F5B461"/>
              <stop offset="100%" stop-color="#E8943A"/>
            </linearGradient>
            <filter id="brandGlow">
              <feGaussianBlur stdDeviation="1.5" result="blurred"/>
              <feMerge><feMergeNode in="blurred"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <rect x="10" y="11" width="36" height="7" rx="3.5" fill="url(#brandMarkGradient)"/>
          <path d="M44 14 L14 42" stroke="url(#brandMarkGradient)" stroke-width="7" stroke-linecap="round" filter="url(#brandGlow)"/>
          <rect x="10" y="38" width="36" height="7" rx="3.5" fill="url(#brandMarkGradient)"/>
          <circle cx="46" cy="42" r="4" fill="#FFCB75" opacity="0.9" filter="url(#brandGlow)"/>
        </svg>
        <span class="brand-name">
          <span class="brand-zor">ZOR</span><span class="brand-ivo">IVO</span>
        </span>
      </a>
      <nav class="nav-cta" aria-label="Primary">
        <a href="#early-access" class="btn btn-ghost">Early Access</a>
      </nav>
    </header>

    <!-- ─── HERO ─── -->
    <main id="main">
      <section class="hero">
        <div class="hero-copy">
          <p class="hero-eyebrow">Something different</p>
          <h1 class="hero-title">
            <span class="title-line">One Platform.</span>
            <span class="title-line title-accent">Coming Soon.</span>
          </h1>
        </div>

        <div class="hero-visual" aria-hidden="true">
          <article class="visual-card">
            <!-- Window chrome -->
            <div class="card-chrome">
              <div class="chrome-dots"><span></span><span></span><span></span></div>
              <span class="chrome-url">zorivo.uz</span>
            </div>

            <!-- Stylised dashboard -->
            <div class="dash">
              <!-- Sidebar -->
              <div class="dash-side">
                <svg class="dash-logo" viewBox="0 0 56 56" fill="none">
                  <defs><linearGradient id="dg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F5B461"/><stop offset="100%" stop-color="#E8943A"/></linearGradient></defs>
                  <rect x="10" y="11" width="36" height="7" rx="3.5" fill="url(#dg)"/>
                  <path d="M44 14 L14 42" stroke="url(#dg)" stroke-width="7" stroke-linecap="round"/>
                  <rect x="10" y="38" width="36" height="7" rx="3.5" fill="url(#dg)"/>
                  <circle cx="46" cy="42" r="4" fill="#FFCB75" opacity="0.9"/>
                </svg>
                <div class="dash-nav">
                  <div class="nav-pill active"></div>
                  <div class="nav-pill"></div>
                  <div class="nav-pill"></div>
                  <div class="nav-pill"></div>
                  <div class="nav-pill short"></div>
                </div>
                <div class="nav-pill bottom-pill"></div>
              </div>

              <!-- Main area -->
              <div class="dash-main">
                <!-- Top bar -->
                <div class="dash-topbar">
                  <div class="topbar-title"></div>
                  <div class="topbar-actions"><span></span><span></span></div>
                </div>

                <!-- Metric cards -->
                <div class="dash-metrics">
                  <div class="metric">
                    <div class="metric-label"></div>
                    <div class="metric-value big"></div>
                    <div class="metric-bar"><div class="metric-fill" style="width:72%"></div></div>
                  </div>
                  <div class="metric">
                    <div class="metric-label"></div>
                    <div class="metric-value"></div>
                    <div class="metric-bar"><div class="metric-fill" style="width:58%"></div></div>
                  </div>
                  <div class="metric accent">
                    <div class="metric-label"></div>
                    <div class="metric-value"></div>
                    <div class="metric-bar"><div class="metric-fill gold" style="width:85%"></div></div>
                  </div>
                </div>

                <!-- Chart -->
                <div class="dash-chart">
                  <div class="chart-head">
                    <div class="chart-title"></div>
                    <div class="chart-tabs"><span class="tab active"></span><span class="tab"></span><span class="tab"></span></div>
                  </div>
                  <div class="chart-area">
                    <div class="bar" style="--h:38%"></div>
                    <div class="bar" style="--h:62%"></div>
                    <div class="bar" style="--h:45%"></div>
                    <div class="bar" style="--h:78%"></div>
                    <div class="bar" style="--h:56%"></div>
                    <div class="bar accent" style="--h:92%"></div>
                    <div class="bar" style="--h:68%"></div>
                    <div class="bar" style="--h:50%"></div>
                    <div class="bar" style="--h:74%"></div>
                  </div>
                </div>

                <!-- Table rows -->
                <div class="dash-table">
                  <div class="table-row"><span class="dot green"></span><div class="cell wide"></div><div class="cell"></div><div class="cell tag"></div></div>
                  <div class="table-row"><span class="dot gold"></span><div class="cell wide"></div><div class="cell"></div><div class="cell tag"></div></div>
                  <div class="table-row"><span class="dot"></span><div class="cell wide"></div><div class="cell"></div><div class="cell tag"></div></div>
                </div>
              </div>
            </div>
          </article>
        </div>
      </section>

    </main>

    <!-- ─── FOOTER ─── -->
    <footer class="site-footer">
      <div class="footer-top">
        <div class="footer-brand">
          <svg class="footer-mark" viewBox="0 0 56 56" fill="none" aria-hidden="true">
            <defs>
              <linearGradient id="footerGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#F5B461"/>
                <stop offset="100%" stop-color="#E8943A"/>
              </linearGradient>
            </defs>
            <rect x="10" y="11" width="36" height="7" rx="3.5" fill="url(#footerGrad)"/>
            <path d="M44 14 L14 42" stroke="url(#footerGrad)" stroke-width="7" stroke-linecap="round"/>
            <rect x="10" y="38" width="36" height="7" rx="3.5" fill="url(#footerGrad)"/>
            <circle cx="46" cy="42" r="4" fill="#FFCB75" opacity="0.9"/>
          </svg>
          <span class="footer-name"><span class="brand-zor">ZOR</span><span class="brand-ivo">IVO</span></span>
        </div>
        <p class="footer-tagline">The business OS for ambitious teams.</p>
      </div>
      <div class="footer-bottom">
        <p class="footer-copy">&copy; 2026 Zorivo. All rights reserved.</p>
        <p class="footer-region">UZ</p>
      </div>
    </footer>
  </div>

  <!-- Runners canvas (must be outside transformed parents) -->
  <canvas id="runnersCanvas" class="runners-canvas" aria-hidden="true"></canvas>

  <!-- UFO -->
  <div class="ufo" aria-hidden="true">
    <div class="ufo-body">
      <div class="ufo-dome"></div>
      <div class="ufo-hull"></div>
      <div class="ufo-lights"><span></span><span></span><span></span><span></span><span></span></div>
    </div>
    <div class="ufo-beam"></div>
  </div>

  <!-- Alien Tank -->
  <div class="alien-tank" id="alienTank" aria-hidden="true">
    <div class="tank-body">
      <div class="tank-turret">
        <div class="tank-barrel-wrap">
          <div class="tank-barrel"></div>
          <div class="tank-muzzle"></div>
        </div>
      </div>
      <div class="tank-hull">
        <div class="tank-viewport"></div>
        <div class="tank-stripe"></div>
      </div>
      <div class="tank-treads">
        <div class="tread-track">
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="tread-wheel tw1"></div>
        <div class="tread-wheel tw2"></div>
        <div class="tread-wheel tw3"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
